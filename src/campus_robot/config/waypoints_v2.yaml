# Campus Delivery Waypoints — v2 (67.5x67.5m campus, scaled 0.45x from original 150x150m)
# Coordinates match waypoint markers in campus_v2.world
# Robot spawns at: Main Gate (0, -24.75), facing north (yaw=1.5708)
# Building positions maintain >=4m clearance from roads and >=6m edge-to-edge
# clearance between buildings, computed from each mesh's real (inch-corrected)
# bounding box — each waypoint sits ~1m off its building's near edge, facing
# the building. medical_center is a custom primitive-box building (not a mesh)
# sized and placed to avoid straddling road_ns, which runs the full 67.5m
# length through the campus center.

waypoints:
  main_gate:
    x: 0.0
    y: -24.75
    z: 0.0
    yaw: 1.5708
    description: "Main Gate — robot spawn/home point"

  library:
    x: -16.0
    y: 7.5
    z: 0.0
    yaw: 0.0
    description: "Library Block (school model) — NW"

  admin_block:
    x: 13.5
    y: 7.5
    z: 0.0
    yaw: 3.1416
    description: "Admin Block (post_office model) — NE"

  canteen:
    x: -12.69
    y: -7.5
    z: 0.0
    yaw: 0.0
    description: "Canteen (fast_food model) — SW"

  hostel:
    x: 15.74
    y: -7.5
    z: 0.0
    yaw: 3.1416
    description: "Hostel (apartment model, 0.65x scale) — SE"

  medical_center:
    x: 13.5
    y: 22.7
    z: 0.0
    yaw: 3.1416
    description: "Medical Center (custom clinic building, white with red cross) — just north of Admin Block"
